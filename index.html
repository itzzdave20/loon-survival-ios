<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Loon Survival">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#17181c">
    <title>Loon Survival</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="app">
      <canvas id="game" aria-label="Loon Survival"></canvas>
      <div id="hud">
        <div class="meter">
          <span>HP</span>
          <strong id="health">100</strong>
        </div>
        <button id="install" type="button">Install</button>
      </div>
      <div id="left-stick" class="stick" aria-hidden="true"><span></span></div>
      <div id="right-stick" class="stick" aria-hidden="true"><span></span></div>
      <button id="fire" type="button" aria-label="Fire">FIRE</button>
      <div id="message">Loading</div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
